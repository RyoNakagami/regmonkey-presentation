<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1300 600" font-family="'Helvetica Neue', 'Hiragino Sans', 'Yu Gothic', sans-serif">
  <defs>
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#e8e4d8" stroke-width="0.5"/>
    </pattern>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#3a6e6a"/>
    </marker>
    <marker id="arrowGray" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#888"/>
    </marker>
    <marker id="arrowOrange" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#c77a3e"/>
    </marker>
  </defs>

  <rect width="1300" height="600" fill="#f7f5f0"/>
  <rect width="1300" height="600" fill="url(#grid)"/>

  <!-- ============ ユーザのマシン (デバイス枠) ============ -->
  <rect x="20" y="40" width="780" height="540" rx="10"
        fill="rgba(248,245,235,0.4)" stroke="#999" stroke-width="1" stroke-dasharray="2,4"/>
  <text x="35" y="62" font-size="10" fill="#999" letter-spacing="2">USER'S MACHINE / ローカル環境</text>

  <!-- ============ MCP HOST 枠 (AIアプリケーション) ============ -->
  <rect x="50" y="90" width="430" height="470" rx="8"
        fill="rgba(255,255,255,0.7)" stroke="#2a2a2a" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="70" y="115" font-size="11" fill="#888" letter-spacing="2">MCP HOST</text>
  <text x="70" y="138" font-size="15" font-weight="600" fill="#2a2a2a">AI アプリケーション</text>
  <text x="70" y="155" font-size="11" fill="#666" font-style="italic">(Claude Desktop / Claude Code 等)</text>

  <!-- AIアプリ本体（Host内のコア） -->
  <rect x="80" y="320" width="140" height="60" rx="6"
        fill="#2a2a2a" stroke="#2a2a2a" stroke-width="1.5"/>
  <text x="150" y="343" text-anchor="middle" font-size="9" fill="#888" letter-spacing="2">CORE</text>
  <text x="150" y="365" text-anchor="middle" font-size="13" font-weight="600" fill="#f7f5f0">LLM / UI</text>

  <!-- MCP Client × 3 -->
  <g>
    <rect x="290" y="190" width="160" height="60" rx="6"
          fill="#fff" stroke="#2a2a2a" stroke-width="1.5"/>
    <text x="370" y="212" text-anchor="middle" font-size="9" fill="#888" letter-spacing="2">MCP CLIENT</text>
    <text x="370" y="234" text-anchor="middle" font-size="13" font-weight="600" fill="#2a2a2a">Client A</text>
  </g>
  <g>
    <rect x="290" y="320" width="160" height="60" rx="6"
          fill="#fff" stroke="#2a2a2a" stroke-width="1.5"/>
    <text x="370" y="342" text-anchor="middle" font-size="9" fill="#888" letter-spacing="2">MCP CLIENT</text>
    <text x="370" y="364" text-anchor="middle" font-size="13" font-weight="600" fill="#2a2a2a">Client B</text>
  </g>
  <g>
    <rect x="290" y="450" width="160" height="60" rx="6"
          fill="#fff" stroke="#2a2a2a" stroke-width="1.5"/>
    <text x="370" y="472" text-anchor="middle" font-size="9" fill="#888" letter-spacing="2">MCP CLIENT</text>
    <text x="370" y="494" text-anchor="middle" font-size="13" font-weight="600" fill="#2a2a2a">Client C</text>
  </g>

  <!-- Core から Client への内部リンク (直交線のみ) -->
  <polyline points="220,335 255,335 255,220 290,220"
            fill="none" stroke="#888" stroke-width="1.2" stroke-dasharray="3,3" marker-end="url(#arrowGray)"/>
  <polyline points="220,350 290,350"
            fill="none" stroke="#888" stroke-width="1.2" stroke-dasharray="3,3" marker-end="url(#arrowGray)"/>
  <polyline points="220,365 255,365 255,480 290,480"
            fill="none" stroke="#888" stroke-width="1.2" stroke-dasharray="3,3" marker-end="url(#arrowGray)"/>

  <!-- ============ ローカル MCP Server × 2 ============ -->
  <line x1="450" y1="220" x2="560" y2="220"
        stroke="#3a6e6a" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#arrow)"/>
  <text x="505" y="212" text-anchor="middle" font-size="8" fill="#3a6e6a" font-weight="600" letter-spacing="0.5">JSON-RPC / stdio</text>

  <g>
    <rect x="560" y="190" width="170" height="60" rx="6"
          fill="#fff" stroke="#2a2a2a" stroke-width="1.5"/>
    <text x="645" y="212" text-anchor="middle" font-size="9" fill="#888" letter-spacing="2">LOCAL MCP SERVER</text>
    <text x="645" y="234" text-anchor="middle" font-size="12" font-weight="600" fill="#2a2a2a">ブラウザ操作 Server</text>
  </g>

  <line x1="450" y1="350" x2="560" y2="350"
        stroke="#3a6e6a" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#arrow)"/>
  <text x="505" y="342" text-anchor="middle" font-size="8" fill="#3a6e6a" font-weight="600" letter-spacing="0.5">JSON-RPC / stdio</text>

  <g>
    <rect x="560" y="320" width="170" height="60" rx="6"
          fill="#fff" stroke="#2a2a2a" stroke-width="1.5"/>
    <text x="645" y="342" text-anchor="middle" font-size="9" fill="#888" letter-spacing="2">LOCAL MCP SERVER</text>
    <text x="645" y="364" text-anchor="middle" font-size="12" font-weight="600" fill="#2a2a2a">ファイル / DB Server</text>
  </g>

  <!-- ============ Client C → リモート (Host外、別マシンへ) ============ -->
  <line x1="450" y1="480" x2="870" y2="480"
        stroke="#c77a3e" stroke-width="2.2" stroke-dasharray="6,4" marker-end="url(#arrowOrange)"/>
  <rect x="585" y="455" width="180" height="22" rx="3" fill="#f7f5f0" stroke="#c77a3e" stroke-width="1"/>
  <text x="675" y="470" text-anchor="middle" font-size="10" fill="#c77a3e" font-weight="600" letter-spacing="1">JSON-RPC / HTTP+SSE</text>

  <!-- ============ 外部システム (ローカル側の到達先) ============ -->
  <line x1="730" y1="220" x2="850" y2="220"
        stroke="#888" stroke-width="1.5" marker-end="url(#arrowGray)"/>
  <text x="790" y="212" text-anchor="middle" font-size="9" fill="#888" font-style="italic">DevTools Protocol</text>

  <g>
    <rect x="850" y="190" width="170" height="60" rx="6"
          fill="#fff" stroke="#2a2a2a" stroke-width="1.5"/>
    <text x="935" y="212" text-anchor="middle" font-size="9" fill="#888" letter-spacing="2">EXTERNAL SYSTEM</text>
    <text x="935" y="234" text-anchor="middle" font-size="13" font-weight="600" fill="#2a2a2a">Web ブラウザ</text>
  </g>

  <line x1="730" y1="350" x2="850" y2="350"
        stroke="#888" stroke-width="1.5" marker-end="url(#arrowGray)"/>
  <text x="790" y="342" text-anchor="middle" font-size="9" fill="#888" font-style="italic">File I/O / SQL</text>

  <g>
    <rect x="850" y="320" width="170" height="60" rx="6"
          fill="#fff" stroke="#2a2a2a" stroke-width="1.5"/>
    <text x="935" y="342" text-anchor="middle" font-size="9" fill="#888" letter-spacing="2">EXTERNAL SYSTEM</text>
    <text x="935" y="364" text-anchor="middle" font-size="13" font-weight="600" fill="#2a2a2a">ローカル DB / FS</text>
  </g>

  <!-- ============ リモート MCP サーバ (別マシン / クラウド) - HORIZONTAL レイアウト ============ -->
  <rect x="820" y="430" width="460" height="100" rx="10"
        fill="rgba(255,245,235,0.6)" stroke="#c77a3e" stroke-width="1.2" stroke-dasharray="2,4"/>
  <text x="835" y="452" font-size="10" fill="#c77a3e" letter-spacing="2">REMOTE / CLOUD</text>

  <g>
    <rect x="870" y="465" width="170" height="55" rx="6"
          fill="#fff" stroke="#2a2a2a" stroke-width="1.5"/>
    <text x="955" y="485" text-anchor="middle" font-size="9" fill="#888" letter-spacing="2">REMOTE MCP SERVER</text>
    <text x="955" y="505" text-anchor="middle" font-size="12" font-weight="600" fill="#2a2a2a">GitHub MCP Server</text>
  </g>

  <line x1="1040" y1="492" x2="1110" y2="492" stroke="#888" stroke-width="1.5" marker-end="url(#arrowGray)"/>
  <text x="1075" y="484" text-anchor="middle" font-size="9" fill="#888" font-style="italic">REST API</text>

  <g>
    <rect x="1110" y="465" width="160" height="55" rx="6"
          fill="#fff" stroke="#2a2a2a" stroke-width="1.5"/>
    <text x="1190" y="485" text-anchor="middle" font-size="9" fill="#888" letter-spacing="2">EXTERNAL SYSTEM</text>
    <text x="1190" y="505" text-anchor="middle" font-size="12" font-weight="600" fill="#2a2a2a">GitHub</text>
  </g>

  <!-- ============ 凡例 ============ -->
  <g transform="translate(50, 575)">
    <line x1="0" y1="0" x2="28" y2="0" stroke="#3a6e6a" stroke-width="2" stroke-dasharray="6,4"/>
    <text x="36" y="4" font-size="10" fill="#555">MCP (ローカル: stdio)</text>

    <line x1="200" y1="0" x2="228" y2="0" stroke="#c77a3e" stroke-width="2.2" stroke-dasharray="6,4"/>
    <text x="236" y="4" font-size="10" fill="#555">MCP (リモート: HTTP+SSE)</text>

    <line x1="430" y1="0" x2="458" y2="0" stroke="#888" stroke-width="1.5"/>
    <text x="466" y="4" font-size="10" fill="#555">外部システム固有プロトコル</text>
  </g>
</svg>

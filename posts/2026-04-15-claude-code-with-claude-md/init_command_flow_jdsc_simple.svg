<svg width="100%" viewBox="0 0 680 480" role="img" xmlns="http://www.w3.org/2000/svg" style="">
<title style="fill:rgb(0, 0, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Meiryo&quot;, &quot;Hiragino Kaku Gothic ProN&quot;, &quot;Yu Gothic&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">/init コマンドのフロー</title>
<desc style="fill:rgb(0, 0, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Meiryo&quot;, &quot;Hiragino Kaku Gothic ProN&quot;, &quot;Yu Gothic&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">/init コマンドの 4 ステップを示す縦型フローチャート</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<text x="340" y="40" text-anchor="middle" dominant-baseline="central" style="font-size:28px;font-weight:500;font-family:var(--font-sans);fill:#0E3666;fill:rgb(14, 54, 102);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Meiryo&quot;, &quot;Hiragino Kaku Gothic ProN&quot;, &quot;Yu Gothic&quot;, sans-serif;font-size:28px;font-weight:500;text-anchor:middle;dominant-baseline:central">/init コマンド</text>

<g onclick="sendPrompt('What does scanning the codebase involve in /init?')" style="cursor:pointer;fill:rgb(0, 0, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Meiryo&quot;, &quot;Hiragino Kaku Gothic ProN&quot;, &quot;Yu Gothic&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">
<rect x="180" y="80" width="320" height="56" rx="8" fill="#FFFFFF" stroke="#0E3666" stroke-width="0.5" style="fill:rgb(255, 255, 255);stroke:rgb(14, 54, 102);color:rgb(255, 255, 255);stroke-width:0.5px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Meiryo&quot;, &quot;Hiragino Kaku Gothic ProN&quot;, &quot;Yu Gothic&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
<text x="340" y="100" text-anchor="middle" dominant-baseline="central" style="font-size:18px;font-weight:500;font-family:var(--font-sans);fill:#0E3666;fill:rgb(14, 54, 102);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Meiryo&quot;, &quot;Hiragino Kaku Gothic ProN&quot;, &quot;Yu Gothic&quot;, sans-serif;font-size:18px;font-weight:500;text-anchor:middle;dominant-baseline:central">コードベースをスキャン</text>
<text x="340" y="120" text-anchor="middle" dominant-baseline="central" style="font-size:15px;font-family:var(--font-sans);fill:#575757;fill:rgb(87, 87, 87);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Meiryo&quot;, &quot;Hiragino Kaku Gothic ProN&quot;, &quot;Yu Gothic&quot;, sans-serif;font-size:15px;font-weight:400;text-anchor:middle;dominant-baseline:central">ファイルとプロジェクト構造を読込</text>
</g>

<line x1="340" y1="146" x2="340" y2="178" stroke="#575757" stroke-width="1.5" marker-end="url(#arrow)" style="fill:rgb(0, 0, 0);stroke:rgb(87, 87, 87);color:rgb(255, 255, 255);stroke-width:1.5px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Meiryo&quot;, &quot;Hiragino Kaku Gothic ProN&quot;, &quot;Yu Gothic&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

<g onclick="sendPrompt('What goes into the summary that /init creates?')" style="cursor:pointer;fill:rgb(0, 0, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Meiryo&quot;, &quot;Hiragino Kaku Gothic ProN&quot;, &quot;Yu Gothic&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">
<rect x="180" y="184" width="320" height="56" rx="8" fill="#E8F1FE" stroke="#428CE6" stroke-width="0.5" style="fill:rgb(232, 241, 254);stroke:rgb(66, 140, 230);color:rgb(255, 255, 255);stroke-width:0.5px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Meiryo&quot;, &quot;Hiragino Kaku Gothic ProN&quot;, &quot;Yu Gothic&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
<text x="340" y="204" text-anchor="middle" dominant-baseline="central" style="font-size:18px;font-weight:500;font-family:var(--font-sans);fill:#0E3666;fill:rgb(14, 54, 102);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Meiryo&quot;, &quot;Hiragino Kaku Gothic ProN&quot;, &quot;Yu Gothic&quot;, sans-serif;font-size:18px;font-weight:500;text-anchor:middle;dominant-baseline:central">サマリーを作成</text>
<text x="340" y="224" text-anchor="middle" dominant-baseline="central" style="font-size:15px;font-family:var(--font-sans);fill:#428CE6;fill:rgb(66, 140, 230);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Meiryo&quot;, &quot;Hiragino Kaku Gothic ProN&quot;, &quot;Yu Gothic&quot;, sans-serif;font-size:15px;font-weight:400;text-anchor:middle;dominant-baseline:central">規約とコマンドを抽出</text>
</g>

<line x1="340" y1="250" x2="340" y2="282" stroke="#575757" stroke-width="1.5" marker-end="url(#arrow)" style="fill:rgb(0, 0, 0);stroke:rgb(87, 87, 87);color:rgb(255, 255, 255);stroke-width:1.5px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Meiryo&quot;, &quot;Hiragino Kaku Gothic ProN&quot;, &quot;Yu Gothic&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

<g onclick="sendPrompt('Where does /init write the CLAUDE.md file?')" style="cursor:pointer;fill:rgb(0, 0, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Meiryo&quot;, &quot;Hiragino Kaku Gothic ProN&quot;, &quot;Yu Gothic&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">
<rect x="180" y="288" width="320" height="56" rx="8" fill="#B4D7FF" stroke="#0E3666" stroke-width="0.5" style="fill:rgb(180, 215, 255);stroke:rgb(14, 54, 102);color:rgb(255, 255, 255);stroke-width:0.5px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Meiryo&quot;, &quot;Hiragino Kaku Gothic ProN&quot;, &quot;Yu Gothic&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
<text x="340" y="308" text-anchor="middle" dominant-baseline="central" style="font-size:18px;font-weight:500;font-family:var(--font-sans);fill:#0E3666;fill:rgb(14, 54, 102);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Meiryo&quot;, &quot;Hiragino Kaku Gothic ProN&quot;, &quot;Yu Gothic&quot;, sans-serif;font-size:18px;font-weight:500;text-anchor:middle;dominant-baseline:central">サマリーを CLAUDE.md に書き出し</text>
<text x="340" y="328" text-anchor="middle" dominant-baseline="central" style="font-size:15px;font-family:var(--font-sans);fill:#0E3666;fill:rgb(14, 54, 102);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Meiryo&quot;, &quot;Hiragino Kaku Gothic ProN&quot;, &quot;Yu Gothic&quot;, sans-serif;font-size:15px;font-weight:400;text-anchor:middle;dominant-baseline:central">プロジェクトルートに保存</text>
</g>

<line x1="340" y1="354" x2="340" y2="386" stroke="#575757" stroke-width="1.5" marker-end="url(#arrow)" style="fill:rgb(0, 0, 0);stroke:rgb(87, 87, 87);color:rgb(255, 255, 255);stroke-width:1.5px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Meiryo&quot;, &quot;Hiragino Kaku Gothic ProN&quot;, &quot;Yu Gothic&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

<g onclick="sendPrompt('How is CLAUDE.md included in every request?')" style="cursor:pointer;fill:rgb(0, 0, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Meiryo&quot;, &quot;Hiragino Kaku Gothic ProN&quot;, &quot;Yu Gothic&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">
<rect x="180" y="392" width="320" height="56" rx="8" fill="#0E3666" stroke="#0E3666" stroke-width="0.5" style="fill:rgb(14, 54, 102);stroke:rgb(14, 54, 102);color:rgb(255, 255, 255);stroke-width:0.5px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Meiryo&quot;, &quot;Hiragino Kaku Gothic ProN&quot;, &quot;Yu Gothic&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
<text x="340" y="412" text-anchor="middle" dominant-baseline="central" style="font-size:18px;font-weight:500;font-family:var(--font-sans);fill:#FFFFFF;fill:rgb(255, 255, 255);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Meiryo&quot;, &quot;Hiragino Kaku Gothic ProN&quot;, &quot;Yu Gothic&quot;, sans-serif;font-size:18px;font-weight:500;text-anchor:middle;dominant-baseline:central">毎リクエストに自動添付</text>
<text x="340" y="432" text-anchor="middle" dominant-baseline="central" style="font-size:15px;font-family:var(--font-sans);fill:#B4D7FF;fill:rgb(180, 215, 255);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Meiryo&quot;, &quot;Hiragino Kaku Gothic ProN&quot;, &quot;Yu Gothic&quot;, sans-serif;font-size:15px;font-weight:400;text-anchor:middle;dominant-baseline:central">各セッションで自動読込</text>

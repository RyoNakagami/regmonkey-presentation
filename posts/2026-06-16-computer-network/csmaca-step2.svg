<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 407 280" preserveAspectRatio="xMidYMid meet"
     style="display:block; margin:0 auto; background-color:#ffffff; font-family: Meiryo, 'メイリオ', 'Hiragino Kaku Gothic ProN', 'Noto Sans CJK JP', system-ui, sans-serif;">

  <rect width="407" height="280" fill="#FFFFFF"/>

  <defs>
    <marker id="aNavy" markerWidth="7" markerHeight="7" refX="5.5" refY="3.5" orient="auto">
      <path d="M0,0 L7,3.5 L0,7 Z" fill="#0E3666"/>
    </marker>
    <marker id="aAzure" markerWidth="7" markerHeight="7" refX="5.5" refY="3.5" orient="auto">
      <path d="M0,0 L7,3.5 L0,7 Z" fill="#428CE6"/>
    </marker>

    <!-- 端末 A アイコン -->
    <g id="iconA">
      <rect x="6" y="0" width="48" height="36" rx="4" fill="#E8F1FE" stroke="#0E3666" stroke-width="2.5"/>
      <rect x="11" y="4" width="38" height="28" rx="2" fill="#0E3666"/>
      <text x="30" y="24" font-size="17" font-weight="700" fill="#FFFFFF" text-anchor="middle">A</text>
      <polygon points="24,36 36,36 40,46 20,46" fill="#DEDEDE" stroke="#0E3666" stroke-width="1.6"/>
      <rect x="3" y="46" width="54" height="6" rx="2" fill="#DEDEDE" stroke="#0E3666" stroke-width="1.6"/>
    </g>
    <!-- AP アイコン -->
    <g id="iconAP">
      <rect x="0" y="16" width="60" height="24" rx="3" fill="#428CE6" stroke="#0E3666" stroke-width="1.8"/>
      <polygon points="0,16 13,2 73,2 60,16" fill="#6FA8EE" stroke="#0E3666" stroke-width="1.8"/>
      <polygon points="60,16 73,2 73,26 60,40" fill="#0E3666" stroke="#0E3666" stroke-width="1.8"/>
      <rect x="6" y="24" width="48" height="5" rx="2" fill="none" stroke="#FFFFFF" stroke-width="1" stroke-dasharray="2,3"/>
      <line x1="66" y1="2" x2="69" y2="-9" stroke="#0E3666" stroke-width="2"/>
      <circle cx="69" cy="-10" r="2.5" fill="#0E3666"/>
    </g>
    <!-- 端末 C アイコン -->
    <g id="iconC">
      <rect x="6" y="0" width="48" height="36" rx="4" fill="#FBE7E6" stroke="#D31804" stroke-width="2.5"/>
      <rect x="11" y="4" width="38" height="28" rx="2" fill="#D31804"/>
      <text x="30" y="24" font-size="17" font-weight="700" fill="#FFFFFF" text-anchor="middle">C</text>
      <polygon points="24,36 36,36 40,46 20,46" fill="#DEDEDE" stroke="#D31804" stroke-width="1.6"/>
      <rect x="3" y="46" width="54" height="6" rx="2" fill="#DEDEDE" stroke="#D31804" stroke-width="1.6"/>
    </g>
  </defs>

  <g transform="scale(1.1) translate(10,-75)">
    <!-- STEP ヘッダ -->
    <rect x="18" y="95" width="312" height="214" rx="16" fill="#0E3666" fill-opacity="0.05" stroke="#0E3666" stroke-width="1.3" stroke-dasharray="7,5"/>
    <text x="324" y="112" font-size="10.5" font-weight="700" fill="#0E3666" text-anchor="end">AP データリンク</text>
    <rect x="26" y="103" width="200" height="198" rx="14" fill="#428CE6" fill-opacity="0.09" stroke="#428CE6" stroke-width="1.3" stroke-dasharray="7,5"/>
    <text x="34" y="120" font-size="10.5" font-weight="700" fill="#428CE6">A の電波範囲</text>
    <!-- ノード -->
    <use href="#iconAP" transform="translate(140,120)"/>
    <text x="178" y="200" font-size="12" font-weight="700" fill="#0E3666" text-anchor="middle">AP</text>
    <use href="#iconA" transform="translate(40,250)"/>
    <text x="70" y="320" font-size="12" font-weight="700" fill="#0E3666" text-anchor="middle">A</text>
    <use href="#iconC" transform="translate(270,250)"/>
    <text x="300" y="320" font-size="12" font-weight="700" fill="#D31804" text-anchor="middle">C（隠れ端末）</text>

    <!-- CTS 矢印 AP→A -->
    <line x1="150" y1="170" x2="100" y2="258" stroke="#428CE6" stroke-width="2" marker-end="url(#aAzure)"/>
    <line x1="220" y1="170" x2="270" y2="258" stroke="#428CE6" stroke-width="2" marker-end="url(#aAzure)"/>
    <!-- CTS ラベル（送信元 = AP / 宛先 = A） -->
    <g transform="translate(35,150)">
      <rect x="105" y="80" width="90" height="40" rx="6" fill="#FFFFFF" stroke="#428CE6" stroke-width="1.2"/>
      <text x="115" y="96" font-size="11" font-weight="700" fill="#428CE6">CTS送信</text>
      <text x="115" y="112" font-size="10.5" fill="#1A1A1A">宛先MAC = A</text>
    </g>
  </g>
</svg>

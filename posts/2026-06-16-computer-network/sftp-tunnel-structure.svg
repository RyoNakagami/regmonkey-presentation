<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="100%" preserveAspectRatio="xMidYMid meet" style="display:block; margin:0 auto; font-family: Meiryo, 'メイリオ', system-ui, sans-serif;">
  <defs>
    <marker id="arrowNavy" markerWidth="10" markerHeight="10" refX="8" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,4 L0,8 Z" fill="#0E3666"/>
    </marker>
    <marker id="arrowAzure" markerWidth="10" markerHeight="10" refX="8" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,4 L0,8 Z" fill="#428CE6"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="8" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,4 L0,8 Z" fill="#1B7F4B"/>
    </marker>
  </defs>

  <rect width="1600" height="700" fill="#FFFFFF"/>

  <g transform="translate(0,-100)">
  <text x="320" y="130" font-size="18" font-weight="700" fill="#0E3666" text-anchor="middle">SFTP クライアント（Host A）</text>

  <!-- アプリ層 -->
  <rect x="120" y="150" width="400" height="80" rx="8" fill="#FFFFFF" stroke="#0E3666" stroke-width="2"/>
  <rect x="120" y="150" width="6" height="80" rx="3" fill="#428CE6"/>
  <text x="320" y="186" font-size="16" font-weight="700" fill="#0E3666" text-anchor="middle">SFTP アプリ / コマンド</text>
  <text x="320" y="210" font-size="12" fill="#575757" text-anchor="middle">put / get / ls などの操作</text>

  <!-- SSH層 -->
  <rect x="120" y="250" width="400" height="80" rx="8" fill="#E8F1FE" stroke="#1B7F4B" stroke-width="2"/>
  <rect x="120" y="250" width="6" height="80" rx="3" fill="#1B7F4B"/>
  <text x="320" y="286" font-size="16" font-weight="700" fill="#1B7F4B" text-anchor="middle">SSH 層（暗号・復号）</text>
  <text x="320" y="310" font-size="12" fill="#575757" text-anchor="middle">ここで暗号化・復号を行う</text>

  <!-- TCP層 -->
  <rect x="120" y="350" width="400" height="80" rx="8" fill="#FFFFFF" stroke="#0E3666" stroke-width="2"/>
  <rect x="120" y="350" width="6" height="80" rx="3" fill="#0E3666"/>
  <text x="320" y="386" font-size="16" font-weight="700" fill="#0E3666" text-anchor="middle">TCP 層（ポート 22）</text>
  <text x="320" y="410" font-size="12" fill="#575757" text-anchor="middle">信頼性のある配送・順序制御</text>

  <!-- ===================== サーバ側スタック ===================== -->
  <text x="1280" y="130" font-size="18" font-weight="700" fill="#0E3666" text-anchor="middle">SFTP サーバー（Host B）</text>

  <!-- ファイルシステム -->
  <rect x="1080" y="150" width="400" height="80" rx="8" fill="#FFFFFF" stroke="#0E3666" stroke-width="2"/>
  <rect x="1080" y="150" width="6" height="80" rx="3" fill="#428CE6"/>
  <text x="1280" y="186" font-size="16" font-weight="700" fill="#0E3666" text-anchor="middle">ファイルシステム（ディスク）</text>
  <text x="1280" y="210" font-size="12" fill="#575757" text-anchor="middle">ファイルの保存・読み出し</text>

  <!-- SSH層 -->
  <rect x="1080" y="250" width="400" height="80" rx="8" fill="#E8F1FE" stroke="#1B7F4B" stroke-width="2"/>
  <rect x="1080" y="250" width="6" height="80" rx="3" fill="#1B7F4B"/>
  <text x="1280" y="286" font-size="16" font-weight="700" fill="#1B7F4B" text-anchor="middle">SSH 層（暗号・復号）</text>
  <text x="1280" y="310" font-size="12" fill="#575757" text-anchor="middle">ここで復号・暗号化を行う</text>

  <!-- TCP層 -->
  <rect x="1080" y="350" width="400" height="80" rx="8" fill="#FFFFFF" stroke="#0E3666" stroke-width="2"/>
  <rect x="1080" y="350" width="6" height="80" rx="3" fill="#0E3666"/>
  <text x="1280" y="386" font-size="16" font-weight="700" fill="#0E3666" text-anchor="middle">TCP 層（ポート 22）</text>
  <text x="1280" y="410" font-size="12" fill="#575757" text-anchor="middle">信頼性のある配送・順序制御</text>

  <!-- ===================== 縦の引き込み線（TCP層 → トンネル） ===================== -->
  <line x1="320" y1="430" x2="320" y2="590" stroke="#0E3666" stroke-width="2.5"/>
  <line x1="1280" y1="430" x2="1280" y2="590" stroke="#0E3666" stroke-width="2.5"/>
  <line x1="320" y1="590" x2="360" y2="590" stroke="#0E3666" stroke-width="2.5"/>
  <line x1="1280" y1="590" x2="1200" y2="590" stroke="#0E3666" stroke-width="2.5"/>

  <!-- ===================== 共通の SSH セキュアトンネル ===================== -->
  <rect x="360" y="500" width="880" height="180" rx="14" fill="#DEDEDE" stroke="#575757 " stroke-width="2" stroke-dasharray="10,6"/>
  <rect x="640" y="486" width="320" height="28" rx="14" fill="#FFFFFF" stroke="#575757 "/>
  <text x="800" y="505" font-size="13" font-weight="700" fill="#1a1a1a" text-anchor="middle">共通の SSH セキュアトンネル（TCP 22）</text>

  <!-- Upload 矢印（client → server） -->
  <line x1="360" y1="560" x2="1240" y2="560" stroke="#0E3666" stroke-width="3" marker-end="url(#arrowNavy)"/>
  <rect x="450" y="528" width="700" height="24" rx="5" fill="#FFFFFF" stroke="#428CE6"/>
  <text x="800" y="545" font-size="13" font-weight="700" fill="#428CE6" text-anchor="middle">▲ Upload（put）：クライアント側で暗号化 → サーバ側で復号</text>

  <!-- Download 矢印（server → client） -->
  <line x1="1240" y1="620" x2="360" y2="620" stroke="#0E3666" stroke-width="3" marker-end="url(#arrowNavy)"/>
  <rect x="450" y="628" width="700" height="24" rx="5" fill="#FFFFFF" stroke="#1B7F4B"/>
  <text x="800" y="645" font-size="13" font-weight="700" fill="#1B7F4B" text-anchor="middle">▼ Download（get）：サーバ側で暗号化 → クライアント側で復号</text>

  <!-- ===================== footer legend ===================== -->
  <rect x="60" y="698" width="1480" height="42" rx="6" fill="#E8F1FE"/>
  <line x1="80" y1="719" x2="120" y2="719" stroke="#428CE6" stroke-width="3"/>
  <text x="128" y="724" font-size="12" fill="#1A1A1A">Upload：クライアント → サーバ</text>
  <line x1="380" y1="719" x2="420" y2="719" stroke="#1B7F4B" stroke-width="3"/>
  <text x="428" y="724" font-size="12" fill="#1A1A1A">Download：サーバ → クライアント</text>
  <rect x="690" y="712" width="40" height="14" rx="3" fill="#DEDEDE" stroke="#575757" stroke-dasharray="10,6"/>
  <text x="738" y="724" font-size="12" fill="#1A1A1A">SSH 暗号化トンネルの範囲</text>
  </g>
</svg>

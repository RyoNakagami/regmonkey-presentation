<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 250" width="100%" height="100%">
  <defs>
    <style>
      .arrow { stroke: #3B82F6; stroke-width: 3; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .arrow-head { fill: #3B82F6; }
      .label-title { font-family: 'Meiryo','Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', sans-serif; font-size: 15px; font-weight: bold; fill: #1E293B; text-anchor: middle; }
      .label-sub { font-family: 'Meiryo','Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', sans-serif; font-size: 12px; fill: #64748B; text-anchor: middle; }
      .icon-label { font-family: 'Meiryo','Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', sans-serif; font-size: 11px; font-weight: bold; fill: #FFFFFF; text-anchor: middle; }
      .shadow { filter: drop-shadow(0px 4px 6px rgba(15, 23, 42, 0.08)); }
      .signal-line { stroke: #10B981; stroke-width: 2; fill: none; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3B82F6" />
    </marker>
  </defs>

  <path d="M 120 200 L 1050 200" class="bg-line" />
  <g transform="translate(0,-50)">
  <g id="step1" class="shadow" transform="translate(40, 0)">
    <g transform="translate(50, 130)">
      <rect x="0" y="0" width="60" height="80" rx="4" fill="#EFF6FF" stroke="#3B82F6" stroke-width="2"/>
      <path d="M 45 0 L 60 15 L 45 15 Z" fill="#3B82F6"/>
      <line x1="12" y1="30" x2="48" y2="30" stroke="#93C5FD" stroke-width="2" stroke-linecap="round"/>
      <line x1="12" y1="45" x2="48" y2="45" stroke="#93C5FD" stroke-width="2" stroke-linecap="round"/>
    </g>
    <text x="80" y="260" class="label-title">1. 純粋なデータ</text>
    <text x="80" y="280" class="label-sub">（アプリケーション層）</text>
  </g>

  <path d="M 230 170 Q 270 170 310 170" class="arrow" marker-end="url(#arrowhead)" />

  <g id="step2" class="shadow" transform="translate(290, 0)">
    <g transform="translate(45, 130)">
      <rect x="15" y="15" width="70" height="65" rx="4" fill="#FFFBEB" stroke="#D97706" stroke-width="2"/>
      <path d="M 15 15 L 35 0 L 65 0 L 50 15 Z" fill="#FEF3C7" stroke="#D97706" stroke-width="2"/>
      <path d="M 85 15 L 65 0 L 95 0 L 85 15 Z" fill="#FEF3C7" stroke="#D97706" stroke-width="2"/>
      <rect x="30" y="35" width="40" height="25" rx="2" fill="#3B82F6"/>
      <text x="50" y="51" class="icon-label">H</text>
    </g>
    <text x="90" y="260" class="label-title">2. 箱に詰める</text>
    <text x="90" y="280" class="label-sub">ヘッダ付与（L4/L3）</text>
  </g>

  <path d="M 510 170 Q 550 170 590 170" class="arrow" marker-end="url(#arrowhead)" />

  <g id="step3" class="shadow" transform="translate(570, 0)">
    <g transform="translate(35, 120)">
      <rect x="5" y="10" width="110" height="85" rx="8" fill="#F0FDF4" stroke="#10B981" stroke-width="2" stroke-dasharray="4 2"/>
      <rect x="20" y="25" width="65" height="55" rx="4" fill="#FFEBB2" stroke="#B45309" stroke-width="2"/>
      <rect x="32" y="40" width="20" height="15" rx="1" fill="#3B82F6"/>
      <text x="42" y="51" class="icon-label" font-size="9">H</text>
      <g transform="translate(60, 35)">
        <rect x="0" y="0" width="20" height="25" rx="2" fill="#EF4444" stroke="#B91C1C" stroke-width="1"/>
        <text x="10" y="16" font-family='Arial' font-size='9' fill='#FFFFFF' text-anchor='middle' font-weight='bold'>T</text>
      </g>
    </g>
    <text x="95" y="260" class="label-title">3. 伝票添付・保護</text>
    <text x="95" y="280" class="label-sub">トレーラ付与（L2フレーム）</text>
  </g>

  <path d="M 810 170 Q 850 170 890 170" class="arrow" marker-end="url(#arrowhead)" />

  <g id="step4" class="shadow" transform="translate(860, 0)">
    <g transform="translate(30, 125)">
      <path d="M 10 30 L 70 30 L 70 70 L 10 70 Z" fill="#E2E8F0" stroke="#475569" stroke-width="2"/>
      <path d="M 70 40 L 95 40 L 105 55 L 105 70 L 70 70 Z" fill="#94A3B8" stroke="#475569" stroke-width="2"/>
      <circle cx="25" cy="73" r="10" fill="#1E293B"/>
      <circle cx="25" cy="73" r="4" fill="#FFFFFF"/>
      <circle cx="80" cy="73" r="10" fill="#1E293B"/>
      <circle cx="80" cy="73" r="4" fill="#FFFFFF"/>
      <path d="M 75 45 L 90 45 L 96 53 L 75 53 Z" fill="#EFF6FF"/>
      <rect x="25" y="40" width="30" height="25" rx="2" fill="#FFEBB2" stroke="#B45309" stroke-width="1"/>
      
      <path d="M 115 45 L 125 40 M 118 53 L 130 53 M 115 61 L 125 66" stroke="#10B981" stroke-width="2" stroke-linecap="round"/>
    </g>
    <text x="90" y="260" class="label-title">4. 搬送・出荷</text>
    <text x="90" y="280" class="label-sub">電気・光信号へ変換（L1物理層）</text>
  </g>
  </g>
</svg>

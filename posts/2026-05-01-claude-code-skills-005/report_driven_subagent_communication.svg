<svg viewBox="0 0 680 480" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="レポート駆動型アプローチによるエージェント間情報共有">
  <title>レポート駆動型アプローチによるエージェント間情報共有</title>
  <desc>親エージェントとSubagentが永続化されたレポートファイルを介して情報を共有する仕組みの構造図</desc>

  <defs>
    <marker id="arrow-rd" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#1A1A1A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <style>
    .rd-svg text { font-family: Meiryo, "メイリオ", -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", sans-serif; fill: #1A1A1A; }
    .t-title   { font-size: 16px; font-weight: 700; }
    .t-sub     { font-size: 14px; font-weight: 600; }
    .t-body    { font-size: 14px; font-weight: 400; fill: #333; }
    .t-anno    { font-size: 14px; font-weight: 500; fill: #333; }
  </style>

  <g class="rd-svg">

    <!-- Parent agent (top) -->
    <rect x="40" y="20" width="600" height="100" rx="12" fill="none" stroke="#1A1A1A" stroke-width="1.2"/>
    <text x="60" y="48" class="t-title">Parent agent</text>
    <text x="60" y="68" class="t-body">親セッション・Skillロード済み</text>

    <rect x="64" y="78" width="240" height="34" rx="6" fill="none" stroke="#1A1A1A" stroke-width="1"/>
    <text x="184" y="96" class="t-sub"  text-anchor="middle">タスク分解と指示書生成</text>
    <text x="184" y="110" class="t-body" text-anchor="middle">prompt + 期待アウトプット定義</text>

    <rect x="376" y="78" width="240" height="34" rx="6" fill="none" stroke="#1A1A1A" stroke-width="1"/>
    <text x="496" y="96" class="t-sub"  text-anchor="middle">レポート受領・統合</text>
    <text x="496" y="110" class="t-body" text-anchor="middle">構造化結果を読込み次工程へ</text>

    <line x1="304" y1="96" x2="372" y2="96" stroke="#777" stroke-width="1.2" stroke-dasharray="3 3" marker-end="url(#arrow-rd)"/>

    <!-- Shared file system / channel (middle) -->
    <rect x="120" y="160" width="440" height="84" rx="10" fill="none" stroke="#1A1A1A" stroke-width="1.2" stroke-dasharray="5 3"/>
    <text x="340" y="186" class="t-title" text-anchor="middle">Shared file system / report channel</text>
    <text x="340" y="208" class="t-body"  text-anchor="middle">.md  /  .json  /  structured artifact</text>
    <text x="340" y="228" class="t-anno"  text-anchor="middle">エージェント間で参照可能な永続レイヤー</text>

    <!-- Parent → Channel (① write brief) -->
    <line x1="184" y1="120" x2="184" y2="156" stroke="#1A1A1A" stroke-width="1.4" marker-end="url(#arrow-rd)"/>
    <text x="200" y="140" class="t-anno">①  指示書 write</text>

    <!-- Channel → Parent (④ read report) -->
    <line x1="496" y1="156" x2="496" y2="120" stroke="#1A1A1A" stroke-width="1.4" marker-end="url(#arrow-rd)"/>
    <text x="510" y="140" class="t-anno">④  report read</text>

    <!-- Subagent A (bottom-left) -->
    <rect x="40" y="296" width="280" height="160" rx="12" fill="none" stroke="#1A1A1A" stroke-width="1.2"/>
    <text x="60" y="322" class="t-title">Subagent A</text>
    <text x="60" y="342" class="t-body">独立コンテキスト・Skill再ロード</text>

    <rect x="64" y="352" width="232" height="28" rx="6" fill="none" stroke="#1A1A1A" stroke-width="1"/>
    <text x="180" y="371" class="t-body" text-anchor="middle">指示書を読込み, Skillを起動時ロード</text>

    <rect x="64" y="386" width="232" height="28" rx="6" fill="none" stroke="#1A1A1A" stroke-width="1"/>
    <text x="180" y="405" class="t-body" text-anchor="middle">タスク実行</text>

    <rect x="64" y="420" width="232" height="28" rx="6" fill="none" stroke="#1A1A1A" stroke-width="1"/>
    <text x="180" y="439" class="t-body" text-anchor="middle">構造化レポートを書出し</text>

    <!-- Subagent B (bottom-right) -->
    <rect x="360" y="296" width="280" height="160" rx="12" fill="none" stroke="#1A1A1A" stroke-width="1.2"/>
    <text x="380" y="322" class="t-title">Subagent B</text>
    <text x="380" y="342" class="t-body">独立コンテキスト・Skill再ロード</text>

    <rect x="384" y="352" width="232" height="28" rx="6" fill="none" stroke="#1A1A1A" stroke-width="1"/>
    <text x="500" y="371" class="t-body" text-anchor="middle">指示書を読込み, Skillを起動時ロード</text>

    <rect x="384" y="386" width="232" height="28" rx="6" fill="none" stroke="#1A1A1A" stroke-width="1"/>
    <text x="500" y="405" class="t-body" text-anchor="middle">タスク実行</text>

    <rect x="384" y="420" width="232" height="28" rx="6" fill="none" stroke="#1A1A1A" stroke-width="1"/>
    <text x="500" y="439" class="t-body" text-anchor="middle">構造化レポートを書出し</text>

    <!-- Channel → Subagent A (② brief read) -->
    <line x1="184" y1="244" x2="184" y2="292" stroke="#1A1A1A" stroke-width="1.4" marker-end="url(#arrow-rd)"/>
    <text x="200" y="268" class="t-anno">②  brief read</text>

    <!-- Subagent B → Channel (③ report write) -->
    <line x1="496" y1="292" x2="496" y2="244" stroke="#1A1A1A" stroke-width="1.4" marker-end="url(#arrow-rd)"/>
    <text x="510" y="268" class="t-anno">③  report write</text>

  </g>
</svg>

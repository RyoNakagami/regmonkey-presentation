<svg xmlns="http://www.w3.org/2000/svg" width="620" height="380" font-family="Arial, sans-serif">

  <!-- top accent line -->
  <rect x="0" y="0" width="620" height="4" fill="#0E3666"/>

  <!-- title -->
  <text x="16" y="26" font-size="13" font-weight="bold" fill="#1a1a1a">IT project resolution by Agile vs Waterfall</text>
  <!-- subtitle -->
  <text x="16" y="42" font-size="11" fill="#555">Standish Group CHAOS Report, 2015</text>
  <!-- rule -->
  <line x1="16" y1="50" x2="604" y2="50" stroke="#1a1a1a" stroke-width="1"/>

  <!-- legend -->
  <rect x="180" y="57" width="12" height="12" fill="#0E3666"/>
  <text x="196" y="68" font-size="11" fill="#1a1a1a">Successful</text>
  <rect x="280" y="57" width="12" height="12" fill="#6E9DC5"/>
  <text x="296" y="68" font-size="11" fill="#1a1a1a">Challenged</text>
  <rect x="380" y="57" width="12" height="12" fill="#C8D8E8"/>
  <text x="396" y="68" font-size="11" fill="#1a1a1a">Failed</text>

  <!-- baseline x=200, plotWidth=400px (100%) → 1%=4px, barHeight=20, gap=12 -->
  <!-- rows: y-center at 95,127,159,191,223,255,287,319 -->

  <!-- row labels (right-aligned at x=195) -->
  <text x="195" y="100" text-anchor="end" font-size="11" fill="#1a1a1a">Waterfall, All projects</text>
  <text x="195" y="132" text-anchor="end" font-size="11" fill="#1a1a1a">Agile, All projects</text>
  <text x="195" y="164" text-anchor="end" font-size="11" fill="#1a1a1a">Waterfall, Large projects</text>
  <text x="195" y="196" text-anchor="end" font-size="11" fill="#1a1a1a">Agile, Large projects</text>
  <text x="195" y="228" text-anchor="end" font-size="11" fill="#1a1a1a">Waterfall, Medium projects</text>
  <text x="195" y="260" text-anchor="end" font-size="11" fill="#1a1a1a">Agile, Medium projects</text>
  <text x="195" y="292" text-anchor="end" font-size="11" fill="#1a1a1a">Waterfall, Small projects</text>
  <text x="195" y="324" text-anchor="end" font-size="11" fill="#1a1a1a">Agile, Small projects</text>

  <!-- ── Waterfall, All: 11 / 60 / 29 ── -->
  <rect x="200" y="88"  width="44"  height="20" fill="#0E3666"/>
  <rect x="244" y="88"  width="240" height="20" fill="#6E9DC5"/>
  <rect x="484" y="88"  width="116" height="20" fill="#C8D8E8"/>
  <text x="218" y="102" font-size="10" font-weight="bold" fill="#ffffff" text-anchor="middle">11%</text>
  <text x="364" y="102" font-size="10" font-weight="bold" fill="#1a1a1a" text-anchor="middle">60%</text>
  <text x="542" y="102" font-size="10" font-weight="bold" fill="#1a1a1a" text-anchor="middle">29%</text>

  <!-- ── Agile, All: 39 / 52 / 9 ── -->
  <rect x="200" y="120" width="156" height="20" fill="#0E3666"/>
  <rect x="356" y="120" width="208" height="20" fill="#6E9DC5"/>
  <rect x="564" y="120" width="36"  height="20" fill="#C8D8E8"/>
  <text x="278" y="134" font-size="10" font-weight="bold" fill="#ffffff" text-anchor="middle">39%</text>
  <text x="460" y="134" font-size="10" font-weight="bold" fill="#1a1a1a" text-anchor="middle">52%</text>
  <text x="582" y="134" font-size="10" font-weight="bold" fill="#1a1a1a" text-anchor="middle">9%</text>

  <!-- ── Waterfall, Large: 3 / 55 / 42 ── -->
  <rect x="200" y="152" width="12"  height="20" fill="#0E3666"/>
  <rect x="212" y="152" width="220" height="20" fill="#6E9DC5"/>
  <rect x="432" y="152" width="168" height="20" fill="#C8D8E8"/>
  <text x="206" y="166" font-size="10" font-weight="bold" fill="#ffffff">3%</text>
  <text x="322" y="166" font-size="10" font-weight="bold" fill="#1a1a1a" text-anchor="middle">55%</text>
  <text x="516" y="166" font-size="10" font-weight="bold" fill="#1a1a1a" text-anchor="middle">42%</text>

  <!-- ── Agile, Large: 18 / 59 / 23 ── -->
  <rect x="200" y="184" width="72"  height="20" fill="#0E3666"/>
  <rect x="272" y="184" width="236" height="20" fill="#6E9DC5"/>
  <rect x="508" y="184" width="92"  height="20" fill="#C8D8E8"/>
  <text x="236" y="198" font-size="10" font-weight="bold" fill="#ffffff" text-anchor="middle">18%</text>
  <text x="390" y="198" font-size="10" font-weight="bold" fill="#1a1a1a" text-anchor="middle">59%</text>
  <text x="554" y="198" font-size="10" font-weight="bold" fill="#1a1a1a" text-anchor="middle">23%</text>

  <!-- ── Waterfall, Medium: 7 / 68 / 25 ── -->
  <rect x="200" y="216" width="28"  height="20" fill="#0E3666"/>
  <rect x="228" y="216" width="272" height="20" fill="#6E9DC5"/>
  <rect x="500" y="216" width="100" height="20" fill="#C8D8E8"/>
  <text x="214" y="230" font-size="10" font-weight="bold" fill="#ffffff" text-anchor="middle">7%</text>
  <text x="364" y="230" font-size="10" font-weight="bold" fill="#1a1a1a" text-anchor="middle">68%</text>
  <text x="550" y="230" font-size="10" font-weight="bold" fill="#1a1a1a" text-anchor="middle">25%</text>

  <!-- ── Agile, Medium: 27 / 62 / 11 ── -->
  <rect x="200" y="248" width="108" height="20" fill="#0E3666"/>
  <rect x="308" y="248" width="248" height="20" fill="#6E9DC5"/>
  <rect x="556" y="248" width="44"  height="20" fill="#C8D8E8"/>
  <text x="254" y="262" font-size="10" font-weight="bold" fill="#ffffff" text-anchor="middle">27%</text>
  <text x="432" y="262" font-size="10" font-weight="bold" fill="#1a1a1a" text-anchor="middle">62%</text>
  <text x="578" y="262" font-size="10" font-weight="bold" fill="#1a1a1a" text-anchor="middle">11%</text>

  <!-- ── Waterfall, Small: 44 / 45 / 11 ── -->
  <rect x="200" y="280" width="176" height="20" fill="#0E3666"/>
  <rect x="376" y="280" width="180" height="20" fill="#6E9DC5"/>
  <rect x="556" y="280" width="44"  height="20" fill="#C8D8E8"/>
  <text x="288" y="294" font-size="10" font-weight="bold" fill="#ffffff" text-anchor="middle">44%</text>
  <text x="466" y="294" font-size="10" font-weight="bold" fill="#1a1a1a" text-anchor="middle">45%</text>
  <text x="578" y="294" font-size="10" font-weight="bold" fill="#1a1a1a" text-anchor="middle">11%</text>

  <!-- ── Agile, Small: 58 / 38 / 4 ── -->
  <rect x="200" y="312" width="232" height="20" fill="#0E3666"/>
  <rect x="432" y="312" width="152" height="20" fill="#6E9DC5"/>
  <rect x="584" y="312" width="16"  height="20" fill="#C8D8E8"/>
  <text x="316" y="326" font-size="10" font-weight="bold" fill="#ffffff" text-anchor="middle">58%</text>
  <text x="508" y="326" font-size="10" font-weight="bold" fill="#1a1a1a" text-anchor="middle">38%</text>
  <text x="592" y="326" font-size="10" font-weight="bold" fill="#1a1a1a" text-anchor="middle">4%</text>

  <!-- x-axis -->
  <line x1="200" y1="338" x2="600" y2="338" stroke="#1a1a1a" stroke-width="1"/>
  <text x="200" y="352" text-anchor="middle" font-size="10" fill="#666">0%</text>
  <text x="300" y="352" text-anchor="middle" font-size="10" fill="#666">25%</text>
  <text x="400" y="352" text-anchor="middle" font-size="10" fill="#666">50%</text>
  <text x="500" y="352" text-anchor="middle" font-size="10" fill="#666">75%</text>
  <text x="600" y="352" text-anchor="middle" font-size="10" fill="#666">100%</text>

  <!-- baseline -->
  <line x1="200" y1="82" x2="200" y2="338" stroke="#1a1a1a" stroke-width="1.5"/>

  <!-- source -->
  <text x="16" y="372" font-size="10" fill="#888">Source: Standish Group CHAOS Report, 2015</text>
</svg>

<svg viewBox="0 60 1920 500" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="1つの Sprint の中で計画→開発→テスト→レビューの workflow を循環的に回す">
  <title>Sprint 内 workflow</title>
  <desc>1 つの Sprint の中で計画→開発→テスト→レビューの workflow を回し，レビューの結果を次の Sprint の計画へ戻す．</desc>

  <defs>
    <marker id="arrow-main" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#0E3666" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <style>
    .slide-svg text { font-family: Meiryo, "メイリオ", -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", sans-serif; fill: #1A1A1A; }
    .t-step  { font-size: 40px; font-weight: 700; }
    .t-cycle { font-size: 32px; font-weight: 500; }
  </style>

  <g class="slide-svg">

    <!-- 計画 -->
    <rect x="70" y="120" width="340" height="130" rx="12" fill="none" stroke="#0E3666" stroke-width="2"/>
    <text x="240" y="200" text-anchor="middle" class="t-step">計画</text>
    <line x1="420" y1="185" x2="520" y2="185" stroke="#0E3666" stroke-width="2.5" marker-end="url(#arrow-main)"/>

    <!-- 開発 -->
    <rect x="530" y="120" width="340" height="130" rx="12" fill="none" stroke="#0E3666" stroke-width="2"/>
    <text x="700" y="200" text-anchor="middle" class="t-step">開発</text>
    <line x1="880" y1="185" x2="980" y2="185" stroke="#0E3666" stroke-width="2.5" marker-end="url(#arrow-main)"/>

    <!-- テスト -->
    <rect x="990" y="120" width="340" height="130" rx="12" fill="none" stroke="#0E3666" stroke-width="2"/>
    <text x="1160" y="200" text-anchor="middle" class="t-step">テスト</text>
    <line x1="1340" y1="185" x2="1440" y2="185" stroke="#0E3666" stroke-width="2.5" marker-end="url(#arrow-main)"/>

    <!-- レビュー -->
    <rect x="1450" y="120" width="340" height="130" rx="12" fill="none" stroke="#0E3666" stroke-width="2"/>
    <text x="1620" y="200" text-anchor="middle" class="t-step">レビュー</text>

    <!-- loop back arrow: レビュー → 計画 -->
    <path d="M1620 250 L1620 340 L240 340 L240 250"
          fill="none" stroke="#0E3666" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow-main)"/>
    <text x="930" y="410" text-anchor="middle" class="t-cycle">動くソフトを届け，フィードバックを次の Sprint の計画へ反映</text>

  </g>
</svg>
